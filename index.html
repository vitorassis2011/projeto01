<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Fighter Simples em HTML5</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 400px;
            background-image: url('https://via.placeholder.com/800x400?text=Street+Fighter+Arena'); /* Substitua por uma imagem de arena real */
            background-size: cover;
            border: 2px solid #fff;
            overflow: hidden;
        }
        .character {
            position: absolute;
            width: 100px;
            height: 150px;
            background-size: contain;
            background-repeat: no-repeat;
        }
        #player1 {
            left: 100px;
            bottom: 0;
            background-image: url('https://via.placeholder.com/100x150?text=Ryu'); /* Substitua por sprite de Ryu */
            transform: scaleX(1); /* Para virar para a direita */
        }
        #player2 {
            right: 100px;
            bottom: 0;
            background-image: url('https://via.placeholder.com/100x150?text=Ken'); /* Substitua por sprite de Ken */
            transform: scaleX(-1); /* Virado para a esquerda */
        }
        .health-bar {
            position: absolute;
            top: 10px;
            width: 300px;
            height: 20px;
            background-color: red;
            border: 2px solid #fff;
        }
        #health1 {
            left: 10px;
        }
        #health2 {
            right: 10px;
        }
        .health-fill {
            height: 100%;
            background-color: green;
            width: 100%;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            display: none;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="player1" class="character"></div>
        <div id="player2" class="character"></div>
        <div id="health1" class="health-bar"><div class="health-fill" id="health-fill1"></div></div>
        <div id="health2" class="health-bar"><div class="health-fill" id="health-fill2"></div></div>
        <div id="message">Jogador 1 Venceu!</div>
        <div id="controls">
            <p>Controles Jogador 1 (Ryu): A/D - Mover, W - Pular, S - Agachar, J - Soco, K - Chute, L - Hadouken</p>
            <p>Controles Jogador 2 (Ken): ←/→ - Mover, ↑ - Pular, ↓ - Agachar, Num1 - Soco, Num2 - Chute, Num3 - Shoryuken</p>
        </div>
    </div>

    <script>
        // Configurações do jogo
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        const GRAVITY = 0.5;
        const JUMP_HEIGHT = 12;
        const MOVE_SPEED = 5;
        const ATTACK_DAMAGE = 10;
        const SPECIAL_DAMAGE = 20;

        // Estados dos jogadores
        let player1 = {
            x: 100,
            y: GAME_HEIGHT - 150,
            vx: 0,
            vy: 0,
            health: 100,
            facingRight: true,
            isJumping: false,
            isCrouching: false,
            isAttacking: false,
            isSpecial: false
        };

        let player2 = {
            x: GAME_WIDTH - 200,
            y: GAME_HEIGHT - 150,
            vx: 0,
            vy: 0,
            health: 100,
            facingRight: false,
            isJumping: false,
            isCrouching: false,
            isAttacking: false,
            isSpecial: false
        };

        // Elementos DOM
        const p1Elem = document.getElementById('player1');
        const p2Elem = document.getElementById('player2');
        const healthFill1 = document.getElementById('health-fill1');
        const healthFill2 = document.getElementById('health-fill2');
        const message = document.getElementById('message');

        // Teclas pressionadas
        const keys = {};

        // Event listeners para teclas
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'l' && !player1.isSpecial) player1.isSpecial = true;
            if (e.key === '3' && !player2.isSpecial) player2.isSpecial = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            if (e.key === 'j' || e.key === 'k') player1.isAttacking = false;
            if (e.key === '1' || e.key === '2') player2.isAttacking = false;
        });

        // Função de atualização do jogo
        function update() {
            // Movimentação Jogador 1
            player1.vx = 0;
            player1.isCrouching = false;
            if (keys['a'] && player1.x > 0) player1.vx = -MOVE_SPEED;
            if (keys['d'] && player1.x < GAME_WIDTH - 100) player1.vx = MOVE_SPEED;
            if (keys['w'] && !player1.isJumping) {
                player1.vy = -JUMP_HEIGHT;
                player1.isJumping = true;
            }
            if (keys['s']) player1.isCrouching = true;
            if (keys['j'] || keys['k']) player1.isAttacking = true;

            // Movimentação Jogador 2
            player2.vx = 0;
            player2.isCrouching = false;
            if (keys['ArrowLeft'] && player2.x > 0) player2.vx = -MOVE_SPEED;
            if (keys['ArrowRight'] && player2.x < GAME_WIDTH - 100) player2.vx = MOVE_SPEED;
            if (keys['ArrowUp'] && !player2.isJumping) {
                player2.vy = -JUMP_HEIGHT;
                player2.isJumping = true;
            }
            if (keys['ArrowDown']) player2.isCrouching = true;
            if (keys['1'] || keys['2']) player2.isAttacking = true;

            // Aplicar gravidade e atualizar posições
            player1.vy += GRAVITY;
            player1.x += player1.vx;
            player1.y += player1.vy;
            if (player1.y >= GAME_HEIGHT - 150) {
                player1.y = GAME_HEIGHT - 150;
                player1.vy = 0;
                player1.isJumping = false;
            }

            player2.vy += GRAVITY;
            player2.x += player2.vx;
            player2.y += player2.vy;
            if (player2.y >= GAME_HEIGHT - 150) {
                player2.y = GAME_HEIGHT - 150;
                player2.vy = 0;
                player2.isJumping = false;
            }

            // Direção dos personagens
            if (player1.x < player2.x) {
                player1.facingRight = true;
                p1Elem.style.transform = 'scaleX(1)';
                player2.facingRight = false;
                p2Elem.style.transform = 'scaleX(-1)';
            } else {
                player1.facingRight = false;
                p1Elem.style.transform = 'scaleX(-1)';
                player2.facingRight = true;
                p2Elem.style.transform = 'scaleX(1)';
            }

            // Detecção de colisão e ataques
            const distance = Math.abs(player1.x - player2.x);
            if (distance < 100) { // Distância para ataque
                if (player1.isAttacking && !player1.isSpecial) {
                    player2.health -= ATTACK_DAMAGE;
                    player1.isAttacking = false;
                }
                if (player2.isAttacking && !player2.isSpecial) {
                    player1.health -= ATTACK_DAMAGE;
                    player2.isAttacking = false;
                }
                if (player1.isSpecial) {
                    player2.health -= SPECIAL_DAMAGE;
                    player1.isSpecial = false;
                    // Animação simples de Hadouken (pode adicionar elemento temporário)
                }
                if (player2.isSpecial) {
                    player1.health -= SPECIAL_DAMAGE;
                    player2.isSpecial = false;
                    // Animação simples de Shoryuken
                }
            }

            // Atualizar barras de vida
            healthFill1.style.width = `${player1.health}%`;
            healthFill2.style.width = `${player2.health}%`;

            // Verificar vitória
            if (player1.health <= 0) {
                message.textContent = 'Jogador 2 (Ken) Venceu!';
                message.style.display = 'block';
                return; // Para o jogo
            }
            if (player2.health <= 0) {
                message.textContent = 'Jogador 1 (Ryu) Venceu!';
                message.style.display = 'block';
                return; // Para o jogo
            }

            // Atualizar posições nos elementos
            p1Elem.style.left = `${player1.x}px`;
            p1Elem.style.bottom = `${GAME_HEIGHT - player1.y - 150}px`; // Ajuste para pular
            p2Elem.style.left = `${player2.x}px`;
            p2Elem.style.bottom = `${GAME_HEIGHT - player2.y - 150}px`;

            // Animações básicas (mude background para sprites animados em produção)
            if (player1.isAttacking) p1Elem.style.backgroundColor = 'yellow'; else p1Elem.style.backgroundColor = '';
            if (player2.isAttacking) p2Elem.style.backgroundColor = 'yellow'; else p2Elem.style.backgroundColor = '';

            requestAnimationFrame(update);
        }

        // Iniciar o jogo
        update();
    </script>
</body>
</html>
