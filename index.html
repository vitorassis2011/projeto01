      top: 0;

      max-width: 1400px;

    }

      color: var(--primary);

    }
    .cart-icon {
      position: relative;
      font-size: 1.9rem;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .cart-icon:hover { transform: scale(1.1); }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .hero {

                  url('https://source.unsplash.com/random/1600x900/?mma,fight') center/cover;
      height: 65vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .hero h1 {
      font-size: 3.8rem;
      margin-bottom: 1rem;
      text-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }
    .hero p { 
      font-size: 1.35rem; 
      max-width: 650px; 
      margin: 0 auto;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 5%;
    }
    .filters {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
    }
    .filter-btn {
      padding: 0.8rem 1.6rem;
      background: #222;
      border: none;
      color: #eee;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
      white-space: nowrap;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--primary);
      transform: translateY(-2px);
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    .product-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s;
    }
    .product-card:hover {
      transform: translateY(-12px);
      box-shadow: 0 15px 30px rgba(200, 16, 46, 0.2);
    }
    .product-card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }
    .product-info {
      padding: 1.3rem;
    }
    .product-info h3 {
      margin-bottom: 0.6rem;
      font-size: 1.2rem;
    }
    .price {
      font-size: 1.45rem;
      color: var(--primary);
      font-weight: bold;
    }
    .btn {
      margin-top: 1rem;
      width: 100%;
      padding: 0.95rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.05rem;
      transition: all 0.3s;

    .btn:hover { background: #a00; transform: translateY(-2px); }
    .btn-green {

    }
    .btn-green:hover { background: #218838; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-content {
      background: #1a1a1a;
      max-width: 950px;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
    }
    .modal-header {

      display: flex;
      justify-content: space-between;
      align-items: center;

      height: 100%;

    let cart = [];

    // Funções renderProducts, showProductModal, addToCart, updateCart, etc. (mesmas do código anterior)

    function renderProducts(filteredProducts) {
      const container = document.getElementById('products');
      container.innerHTML = '';

      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <img src="${product.image}" alt="${product.name}">
          <div class="product-info">
            <h3>${product.name}</h3>
            <p class="price">R$ ${product.price.toFixed(2)}</p>
            <button class="btn view-product" data-id="${product.id}">Ver Detalhes</button>
            <button class="btn btn-green" data-id="${product.id}">Adicionar ao Carrinho</button>
          </div>
        `;
        container.appendChild(card);
      });

      document.querySelectorAll('.view-product').forEach(btn => {
        btn.addEventListener('click', (e) => {
          showProductModal(parseInt(e.target.dataset.id));
        });
      });

      document.querySelectorAll('.product-card .btn-green').forEach(btn => {
        btn.addEventListener('click', (e) => {
          addToCart(parseInt(e.target.dataset.id));
        });
      });
    }

    function showProductModal(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      document.getElementById('modal-title').textContent = product.name;
      document.getElementById('modal-image').src = product.image;
      document.getElementById('modal-description').textContent = product.description;
      document.getElementById('modal-price').textContent = `R$ ${product.price.toFixed(2)}`;

      const modal = document.getElementById('product-modal');
      modal.style.display = 'flex';

      document.getElementById('add-to-cart-modal').onclick = () => {
        addToCart(product.id);
        modal.style.display = 'none';
      };
    }

    document.getElementById('close-modal').addEventListener('click', () => {
      document.getElementById('product-modal').style.display = 'none';
    });

    document.getElementById('product-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('product-modal')) {
        document.getElementById('product-modal').style.display = 'none';
      }
    });

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;

      const existing = cart.find(item => item.id === id);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }

      updateCart();
      alert(`${product.name} foi adicionado ao carrinho!`);
    }

    function updateCart() {
      const count = cart.reduce((acc, item) => acc + item.quantity, 0);
      document.getElementById('cart-count').textContent = count;

      const cartItems = document.getElementById('cart-items');
      cartItems.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        const subtotal = item.price * item.quantity;
        total += subtotal;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.image}" alt="${item.name}">
          <div style="flex:1">
            <h4>${item.name}</h4>
            <p>R$ ${item.price.toFixed(2)} × ${item.quantity}</p>
            <button onclick="removeFromCart(${index})" style="color:#c8102e; background:none; border:none; padding:4px 0; cursor:pointer;">Remover</button>
          </div>
        `;
        cartItems.appendChild(div);
      });

      document.getElementById('cart-total').textContent = total.toFixed(2);
    }

    window.removeFromCart = function(index) {
      cart.splice(index, 1);
      updateCart();
    };

    // Filtros
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const category = btn.dataset.category;
        const filtered = category === 'all' 
          ? products 
          : products.filter(p => p.category === category);

        renderProducts(filtered);
      });
    });

    // Carrinho
    document.getElementById('cart-btn').addEventListener('click', () => {
      document.getElementById('cart-sidebar').classList.toggle('open');
    });

    document.getElementById('close-cart').addEventListener('click', () => {
      document.getElementById('cart-sidebar').classList.remove('open');
    });

    // Inicializar
    renderProducts(products);
  </script>
</body>
</html>
