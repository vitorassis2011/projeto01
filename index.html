<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Mario HTML</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #6b88ff;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #title-screen {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, #0000aa, #000066);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: opacity 0.8s;
    }

    #title-screen h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 6px 6px 0 #000;
      color: #ff4444;
    }

    #title-screen p {
      font-size: 2rem;
      margin: 20px;
    }

    #title-screen button {
      font-size: 2rem;
      padding: 15px 40px;
      background: #ffdd00;
      border: 6px solid #000;
      border-radius: 15px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 8px 0 #aa8800;
    }

    #title-screen button:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #aa8800;
    }

    canvas {
      image-rendering: pixelated;
      width: 100%;
      height: 100%;
      background: #87CEEB;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div id="title-screen">
    <h1>Mini Mario</h1>
    <p>Use ← → para andar • ESPAÇO / ↑ para pular</p>
    <button id="startBtn">COMEÇAR</button>
  </div>

  <canvas id="gameCanvas"></canvas>
</div>

<script>
// ================================================
//  JOGO PRINCIPAL
// ================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

// ------------------- Estados -------------------
let gameState = "title"; // "title" | "playing" | "gameover"

// ------------------- Player -------------------
const player = {
  x: 100,
  y: 300,
  width: 40,
  height: 60,
  vx: 0,
  vy: 0,
  speed: 4,
  jumpPower: -13,
  gravity: 0.6,
  onGround: false,
  facingRight: true
};

// ------------------- Teclas -------------------
const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

// ------------------- Plataformas -------------------
const platforms = [
  {x: 0,   y: canvas.height-40, w: canvas.width*2, h: 80},
  {x: 300, y: 500, w: 280, h: 30},
  {x: 700, y: 380, w: 220, h: 30},
  {x: 1100,y: 480, w: 300, h: 30},
  {x: 1600,y: 320, w: 240, h: 30},
];

// ------------------- Inimigos -------------------
const enemies = [
  {
    x: 900,
    y: 0,
    width: 40,
    height: 40,
    vx: -1.8,
    onGround: false,
    alive: true
  },
  {
    x: 1400,
    y: 0,
    width: 40,
    height: 40,
    vx: 2.2,
    onGround: false,
    alive: true
  }
];

// ================================================
//  LOOP PRINCIPAL
// ================================================
function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (gameState === "title") {
    // só mostra a tela de título (controlada pelo HTML)
  }
  else if (gameState === "playing") {
    updatePlayer();
    updateEnemies();
    checkCollisions();
    drawEverything();
  }
  else if (gameState === "gameover") {
    drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

function updatePlayer() {
  // Movimento horizontal
  player.vx = 0;
  if (keys['arrowleft'] || keys['a']) {
    player.vx = -player.speed;
    player.facingRight = false;
  }
  if (keys['arrowright'] || keys['d']) {
    player.vx = player.speed;
    player.facingRight = true;
  }

  // Pulo
  if ((keys[' '] || keys['arrowup'] || keys['w']) && player.onGround) {
    player.vy = player.jumpPower;
    player.onGround = false;
  }

  // Gravidade
  player.vy += player.gravity;

  player.x += player.vx;
  player.y += player.vy;

  // Colisão com plataformas
  player.onGround = false;
  for (let p of platforms) {
    if (
      player.x + player.width > p.x &&
      player.x < p.x + p.w &&
      player.y + player.height > p.y &&
      player.y + player.height - player.vy <= p.y
    ) {
      if (player.vy > 0) { // caindo
        player.y = p.y - player.height;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Limites da tela (simples)
  if (player.x < 0) player.x = 0;
  if (player.y > canvas.height) {
    die();
  }
}

function updateEnemies() {
  for (let enemy of enemies) {
    if (!enemy.alive) continue;

    enemy.x += enemy.vx;

    // Inimigo bateu na parede invisível → inverte direção
    if (enemy.x < 200 || enemy.x > 1800) {
      enemy.vx *= -1;
    }

    // Gravidade nos inimigos também
    enemy.vy = (enemy.vy || 0) + player.gravity;
    enemy.y += enemy.vy;

    // Colisão com plataformas (inimigos simples ficam só no chão)
    for (let p of platforms) {
      if (
        enemy.x + enemy.width > p.x &&
        enemy.x < p.x + p.w &&
        enemy.y + enemy.height > p.y &&
        enemy.y + enemy.height - (enemy.vy||0) <= p.y
      ) {
        enemy.y = p.y - enemy.height;
        enemy.vy = 0;
      }
    }
  }
}

function checkCollisions() {
  for (let enemy of enemies) {
    if (!enemy.alive) continue;

    // Colisão simples AABB
    if (
      player.x < enemy.x + enemy.width &&
      player.x + player.width > enemy.x &&
      player.y < enemy.y + enemy.height &&
      player.y + player.height > enemy.y
    ) {
      // Se o player está caindo em cima do inimigo → mata inimigo
      if (player.vy > 0 && player.y + player.height - player.vy <= enemy.y + 10) {
        enemy.alive = false;
        player.vy = -10; // quique
      }
      // Senão → player morre
      else {
        die();
      }
    }
  }
}

function die() {
  gameState = "gameover";
  setTimeout(() => {
    // Reset simples
    player.x = 100;
    player.y = 300;
    player.vx = 0;
    player.vy = 0;
    for (let e of enemies) {
      e.alive = true;
      e.x = e.x < 1000 ? 900 : 1400; // volta posição inicial aproximada
    }
    gameState = "playing";
  }, 1800);
}

function drawEverything() {
  // Chão / plataformas
  ctx.fillStyle = "#654321";
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // Player (Mario simplificado)
  ctx.fillStyle = player.facingRight ? "#ff4444" : "#ff6666";
  ctx.fillRect(player.x, player.y, player.width, player.height);

  ctx.fillStyle = "#000";
  // chapéu
  ctx.fillRect(player.x + (player.facingRight?10:0), player.y-10, 20, 10);
  // olhos
  ctx.fillRect(player.x + (player.facingRight?22:8), player.y+15, 6, 6);

  // Inimigos (Goomba-like)
  for (let e of enemies) {
    if (!e.alive) continue;
    ctx.fillStyle = "#964B00";
    ctx.fillRect(e.x, e.y, e.width, e.height);
    ctx.fillStyle = "#000";
    ctx.fillRect(e.x+8, e.y+10, 8, 8);
    ctx.fillRect(e.x+24, e.y+10, 8, 8);
  }
}

function drawGameOver() {
  ctx.fillStyle = "rgba(0,0,0,0.7)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "80px Arial";
  ctx.textAlign = "center";
  ctx.fillText("VOCÊ MORREU!", canvas.width/2, canvas.height/2 - 40);

  ctx.font = "40px Arial";
  ctx.fillText("Reiniciando...", canvas.width/2, canvas.height/2 + 40);
}

// Inicia o jogo
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('title-screen').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('title-screen').style.display = 'none';
    gameState = "playing";
  }, 800);
});

gameLoop();
</script>
</body>
</html>
