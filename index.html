<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Batalha Animal na Floresta</title>
    <style>
        body {
            font-family: 'Press Start 2P', cursive; /* Fonte mais "pixel art" */
            text-align: center;
            background: url('https://i.imgur.com/r02qS6n.png') no-repeat center center fixed; /* Imagem de fundo de floresta */
            background-size: cover;
            color: white;
            margin: 0;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        /* Importar fonte para estilo pixel art */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');


        h1 { font-size: 2.5em; margin-bottom: 20px; color: #f1c40f; }
        .arena {
            display: flex;
            justify-content: space-around;
            align-items: flex-start; /* Alinha os itens no topo */
            margin-top: 30px;
            background: rgba(0,0,0,0.4); /* Fundo semi-transparente para melhor leitura */
            padding: 20px;
            border-radius: 15px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        .animal-card {
            background: rgba(44, 62, 80, 0.9); /* Cor mais escura para os cards */
            width: 250px;
            padding: 20px;
            border: 3px solid #3498db;
            border-radius: 15px;
            margin: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        .animal-card h2 { color: #ecf0f1; font-size: 1.8em; margin-top: 0; }
        .hp-bar { width: 100%; height: 25px; background: #c0392b; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid #7f8c8d; }
        .hp-fill { height: 100%; background: #27ae60; transition: width 0.5s ease-out; }
        .animal-img {
            width: 120px;
            height: 120px;
            object-fit: contain; /* Garante que a imagem se encaixe sem cortar */
            margin-bottom: 10px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 50%;
            padding: 5px;
            border: 1px solid #fff;
        }
        button.attack-btn {
            padding: 12px 25px;
            cursor: pointer;
            background: #e67e22;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            border-radius: 8px;
            transition: background 0.3s, transform 0.1s;
        }
        button.attack-btn:hover:not(:disabled) {
            background: #d35400;
            transform: translateY(-2px);
        }
        button.attack-btn:disabled {
            background: #7f8c8d;
            cursor: not-allowed;
        }
        #log {
            margin-top: 25px;
            font-style: italic;
            color: #bdc3c7;
            font-size: 1.1em;
            min-height: 30px; /* Para evitar pulos de layout */
        }
        #reset-btn {
            display: none;
            margin: 25px auto;
            padding: 15px 30px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }
        #reset-btn:hover {
            background: #2980b9;
        }

        .selection-area {
            margin-bottom: 30px;
            background: rgba(0,0,0,0.5);
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .selection-area select {
            padding: 10px;
            font-size: 1em;
            margin: 0 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            color: #333;
        }
        .selection-area button {
            padding: 10px 20px;
            font-size: 1em;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .selection-area button:hover {
            background: #27ae60;
        }
        .game-controls {
            margin-top: 20px;
        }
        .game-controls button {
            margin: 0 10px;
        }

        /* Esconde a arena inicialmente */
        .arena-container {
            display: none;
        }

    </style>
</head>
<body>

    <h1>Batalha Animal na Floresta</h1>

    <div class="selection-area" id="selectionScreen">
        <p>Escolha seus guerreiros para a batalha:</p>
        <select id="animal1Select"></select>
        <span>VS</span>
        <select id="animal2Select"></select>
        <button onclick="iniciarBatalha()">Iniciar Batalha!</button>
    </div>

    <div class="arena-container" id="gameArena">
        <div class="arena">
            <div class="animal-card" id="player1Card">
                <h2 id="player1Name"></h2>
                <img id="player1Img" class="animal-img" src="" alt="">
                <div class="hp-bar"><div id="hp1" class="hp-fill"></div></div>
                <div class="game-controls">
                    <button class="attack-btn" onclick="atacar(1)">Atacar!</button>
                </div>
            </div>

            <div class="animal-card" id="player2Card">
                <h2 id="player2Name"></h2>
                <img id="player2Img" class="animal-img" src="" alt="">
                <div class="hp-bar"><div id="hp2" class="hp-fill"></div></div>
                <div class="game-controls">
                    <button class="attack-btn" onclick="atacar(2)">Atacar!</button>
                </div>
            </div>
        </div>

        <p id="log">Escolha os animais e inicie a batalha!</p>
        <button onclick="resetGame()" id="reset-btn">Nova Batalha</button>
    </div>
