<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Super Mario - HTML5 Super Detalhado</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', Arial, sans-serif;
        }
        canvas {
            border: 8px solid #fff;
            image-rendering: pixelated;
            box-shadow: 0 0 30px #f00;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="800" height="450"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = 800;
        const HEIGHT = 450;

        // ============ VARIÁVEIS GLOBAIS ============
        let mario = {
            x: 100,
            y: 300,
            width: 32,
            height: 42,
            velX: 0,
            velY: 0,
            speed: 5.5,
            jumpPower: -16.5,
            facing: 1,
            jumping: false,
            frame: 0
        };

        let cameraX = 0;
        let gravity = 0.85;
        let friction = 0.82;
        let score = 0;
        let coinsCollected = 0;
        let lives = 3;
        let currentLevel = 1;
        let gameState = 'playing'; // playing, won, gameover

        let keys = {};
        let platforms = [];
        let enemies = [];
        let collectibles = [];
        let backgroundObjects = [];
        let goal = { x: 0, y: 0 };

        // ============ COLISÃO ============
        function collides(a, b) {
            return (
                a.x < b.x + b.width &&
                a.x + a.width > b.x &&
                a.y < b.y + b.height &&
                a.y + a.height > b.y
            );
        }

        // ============ CARREGAR NÍVEL (2 níveis super detalhados) ============
        function loadLevel(level) {
            platforms = [];
            enemies = [];
            collectibles = [];
            backgroundObjects = [];
            currentLevel = level;

            if (level === 1) {
                // Chão principal longo
                platforms.push({ x: 0, y: 380, width: 2800, height: 70, type: 'ground' });
                
                // Blocos de pergunta com moedas
                platforms.push({ x: 420, y: 240, width: 50, height: 50, type: 'question', coin: true });
                platforms.push({ x: 520, y: 240, width: 50, height: 50, type: 'question', coin: true });
                platforms.push({ x: 620, y: 240, width: 50, height: 50, type: 'question', coin: true });
                platforms.push({ x: 1120, y: 180, width: 50, height: 50, type: 'question', coin: true });

                // Tijolos
                platforms.push({ x: 720, y: 240, width: 50, height: 50, type: 'brick' });
                platforms.push({ x: 770, y: 240, width: 50, height: 50, type: 'brick' });

                // Canos clássicos
                platforms.push({ x: 950, y: 310, width: 90, height: 140, type: 'pipe' });
                platforms.push({ x: 1450, y: 260, width: 90, height: 190, type: 'pipe' });
                platforms.push({ x: 1950, y: 310, width: 90, height: 140, type: 'pipe' });

                // Plataformas flutuantes
                platforms.push({ x: 1650, y: 210, width: 220, height: 25, type: 'solid' });
                platforms.push({ x: 2200, y: 140, width: 120, height: 25, type: 'solid' });

                // Chão final
                platforms.push({ x: 2550, y: 380, width: 400, height: 70, type: 'ground' });

                // Inimigos Goombas
                enemies.push({ x: 680, y: 340, width: 32, height: 32, velX: -1.8, alive: true });
                enemies.push({ x: 1250, y: 340, width: 32, height: 32, velX: -1.8, alive: true });
                enemies.push({ x: 1750, y: 170, width: 32, height: 32, velX: -1.8, alive: true });
                enemies.push({ x: 2100, y: 340, width: 32, height: 32, velX: -1.8, alive: true });

                // Moedas flutuantes
                collectibles.push({ x: 470, y: 170, width: 24, height: 24, collected: false });
                collectibles.push({ x: 1570, y: 130, width: 24, height: 24, collected: false });
                collectibles.push({ x: 2300, y: 280, width: 24, height: 24, collected: false });
                collectibles.push({ x: 2650, y: 300, width: 24, height: 24, collected: false });

                // Meta (bandeira)
                goal = { x: 2750, y: 170 };

                // Cenário (parallax)
                backgroundObjects.push({ type: 'cloud', x: 80, y: 70 });
                backgroundObjects.push({ type: 'cloud', x: 550, y: 40 });
                backgroundObjects.push({ type: 'cloud', x: 1100, y: 90 });
                backgroundObjects.push({ type: 'cloud', x: 1900, y: 55 });
                backgroundObjects.push({ type: 'hill', x: 250, y: 340 });
                backgroundObjects.push({ type: 'hill', x: 1250, y: 340 });
                backgroundObjects.push({ type: 'bush', x: 380, y: 355 });
                backgroundObjects.push({ type: 'bush', x: 850, y: 355 });
                backgroundObjects.push({ type: 'bush', x: 1700, y: 355 });
            } 
            else if (level === 2) {
                // Nível 2 ainda mais desafiador
                platforms.push({ x: 0, y: 380, width: 3200, height: 70, type: 'ground' });
                
                platforms.push({ x: 350, y: 220, width: 50, height: 50, type: 'question', coin: true });
                platforms.push({ x: 450, y: 150, width: 50, height: 50, type: 'question', coin: true });
                platforms.push({ x: 800, y: 240, width: 50, height: 50, type: 'brick' });
                platforms.push({ x: 1150, y: 180, width: 50, height: 50, type: 'question', coin: true });
                
                platforms.push({ x: 1400, y: 310, width: 100, height: 140, type: 'pipe' });
                platforms.push({ x: 1850, y: 240, width: 100, height: 210, type: 'pipe' });
                platforms.push({ x: 2400, y: 310, width: 100, height: 140, type: 'pipe' });

                platforms.push({ x: 1650, y: 180, width: 180, height: 25, type: 'solid' });
                platforms.push({ x: 2150, y: 120, width: 140, height: 25, type: 'solid' });
                platforms.push({ x: 2700, y: 200, width: 120, height: 25, type: 'solid' });

                enemies.push({ x: 500, y: 340, width: 32, height: 32, velX: -2, alive: true });
                enemies.push({ x: 980, y: 340, width: 32, height: 32, velX: -2, alive: true });
                enemies.push({ x: 1550, y: 340, width: 32, height: 32, velX: -2, alive: true });
                enemies.push({ x: 2050, y: 170, width: 32, height: 32, velX: -2, alive: true });
                enemies.push({ x: 2550, y: 340, width: 32, height: 32, velX: -2, alive: true });

                collectibles.push({ x: 400, y: 100, width: 24, height: 24, collected: false });
                collectibles.push({ x: 1200, y: 110, width: 24, height: 24, collected: false });
                collectibles.push({ x: 1800, y: 280, width: 24, height: 24, collected: false });
                collectibles.push({ x: 2600, y: 150, width: 24, height: 24, collected: false });

                goal = { x: 3050, y: 170 };

                backgroundObjects.push({ type: 'cloud', x: 150, y: 60 });
                backgroundObjects.push({ type: 'cloud', x: 750, y: 30 });
                backgroundObjects.push({ type: 'cloud', x: 1600, y: 80 });
                backgroundObjects.push({ type: 'cloud', x: 2400, y: 45 });
                backgroundObjects.push({ type: 'hill', x: 400, y: 340 });
                backgroundObjects.push({ type: 'hill', x: 1700, y: 340 });
                backgroundObjects.push({ type: 'bush', x: 100, y: 355 });
                backgroundObjects.push({ type: 'bush', x: 1200, y: 355 });
                backgroundObjects.push({ type: 'bush', x: 2300, y: 355 });
            }

            // Reset Mario
            mario.x = 80;
            mario.y = 300;
            mario.velX = 0;
            mario.velY = 0;
            cameraX = 0;
        }

        // ============ DESENHAR FUNDO (cenário completo com parallax) ============
        function drawBackground() {
            // Céu gradiente
            let sky = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            sky.addColorStop(0, '#5C94FC');
            sky.addColorStop(1, '#A0D8FF');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            const parallaxSlow = cameraX * 0.15;
            const parallaxMed = cameraX * 0.35;

            // Nuvens e colinas
            ctx.fillStyle = '#fff';
            for (let obj of backgroundObjects) {
                if (obj.type === 'cloud') {
                    let cx = (obj.x - parallaxSlow) % (WIDTH + 400);
                    if (cx < -300) cx += WIDTH + 400;
                    ctx.globalAlpha = 0.95;
                    ctx.beginPath();
                    ctx.ellipse(cx, obj.y, 55, 28, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx + 35, obj.y - 8, 38, 22, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(cx - 32, obj.y - 6, 32, 24, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                else if (obj.type === 'hill') {
                    let hx = obj.x - parallaxMed;
                    ctx.fillStyle = '#0B8B4A';
                    ctx.beginPath();
                    ctx.moveTo(hx, 380);
                    ctx.quadraticCurveTo(hx + 110, 260, hx + 250, 380);
                    ctx.fill();
                    ctx.fillStyle = '#0A7A3F';
                    ctx.beginPath();
                    ctx.moveTo(hx + 40, 380);
                    ctx.quadraticCurveTo(hx + 130, 290, hx + 210, 380);
                    ctx.fill();
                }
                else if (obj.type === 'bush') {
                    let bx = obj.x - cameraX * 0.7;
                    ctx.fillStyle = '#0B8B4A';
                    ctx.beginPath();
                    ctx.ellipse(bx + 25, 365, 45, 22, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(bx + 48, 355, 28, 19, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(bx + 8, 355, 25, 18, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.fillStyle = '#fff';
        }

        // ============ DESENHAR PLATAFORMAS ============
        function drawPlatforms() {
            for (let p of platforms) {
                let px = p.x - cameraX;
                if (px + p.width < 0 || px > WIDTH) continue;

                if (p.type === 'ground' || p.type === 'solid') {
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(px, p.y, p.width, p.height);
                    // Detalhes de tijolos
                    ctx.strokeStyle = '#5E2C0C';
                    ctx.lineWidth = 3;
                    for (let i = 0; i < p.width; i += 28) {
                        ctx.strokeRect(px + i, p.y + 8, 24, 18);
                    }
                } 
                else if (p.type === 'question' || p.type === 'brick') {
                    ctx.fillStyle = p.type === 'question' ? '#F4D03F' : '#E67E22';
                    ctx.fillRect(px, p.y, p.width, p.height);
                    ctx.strokeStyle = '#2C2C2C';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(px + 4, p.y + 4, p.width - 8, p.height - 8);
                    if (p.type === 'question' && p.coin) {
                        ctx.fillStyle = '#000';
                        ctx.font = 'bold 28px Arial';
                        ctx.fillText('?', px + 14, p.y + 38);
                    }
                } 
                else if (p.type === 'pipe') {
                    ctx.fillStyle = '#27AE60';
                    ctx.fillRect(px, p.y, p.width, p.height);
                    ctx.fillStyle = '#1E8449';
                    ctx.fillRect(px - 6, p.y - 12, p.width + 12, 18);
                }
            }
        }

        // ============ DESENHAR MARIO (super detalhado) ============
        function drawMario() {
            let mx = mario.x - cameraX;
            let my = mario.y;
            ctx.save();
            if (mario.facing === -1) {
                ctx.translate(mx + mario.width, my);
                ctx.scale(-1, 1);
            } else {
                ctx.translate(mx, my);
            }

            // Chapéu
            ctx.fillStyle = '#E74C3C';
            ctx.fillRect(3, 3, 26, 9);
            ctx.fillRect(0, 9, 31, 6);

            // Rosto
            ctx.fillStyle = '#F8C98A';
            ctx.fillRect(8, 12, 18, 13);

            // Olho
            ctx.fillStyle = '#000';
            ctx.fillRect(18, 15, 6, 6);
            ctx.fillStyle = '#fff';
            ctx.fillRect(20, 16, 2, 2);

            // Bigode
            ctx.fillStyle = '#2C3E50';
            ctx.fillRect(9, 21, 14, 3);

            // Macacão azul
            ctx.fillStyle = '#2E86C1';
            ctx.fillRect(6, 25, 21, 15);

            // Suspensórios vermelhos
            ctx.fillStyle = '#E74C3C';
            ctx.fillRect(9, 26, 4, 9);
            ctx.fillRect(19, 26, 4, 9);

            // Pernas
            ctx.fillStyle = '#2C3E50';
            ctx.fillRect(8, 37, 7, 8);
            ctx.fillRect(18, 37, 7, 8);

            // Sapatos
            ctx.fillStyle = '#2C2C2C';
            ctx.fillRect(5, 42, 11, 5);
            ctx.fillRect(17, 42, 11, 5);

            ctx.restore();
        }

        // ============ DESENHAR GOOMBAS ============
        function drawEnemies() {
            for (let e of enemies) {
                if (!e.alive) continue;
                let ex = e.x - cameraX;
                // Corpo marrom
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(ex + 2, e.y + 4, 28, 24);
                // Barriga clara
                ctx.fillStyle = '#A66B2E';
                ctx.fillRect(ex + 6, e.y + 16, 20, 10);

                // Olhos brancos
                ctx.fillStyle = '#fff';
                ctx.fillRect(ex + 7, e.y + 8, 7, 9);
                ctx.fillRect(ex + 19, e.y + 8, 7, 9);
                // Pupilas
                ctx.fillStyle = '#000';
                ctx.fillRect(ex + 9, e.y + 10, 3, 5);
                ctx.fillRect(ex + 21, e.y + 10, 3, 5);

                // Boca
                ctx.fillStyle = '#2C2C2C';
                ctx.fillRect(ex + 10, e.y + 22, 13, 3);
            }
        }

        // ============ DESENHAR MOEDAS ============
        function drawCollectibles() {
            for (let c of collectibles) {
                if (c.collected) continue;
                let cx = c.x - cameraX + 12;
                let cy = c.y + 12;

                ctx.fillStyle = '#F4D03F';
                ctx.beginPath();
                ctx.ellipse(cx, cy, 12, 14, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('C', cx, cy + 5);
                ctx.textAlign = 'left';
            }
        }

        // ============ DESENHAR META (mastro + bandeira) ============
        function drawGoal() {
            let gx = goal.x - cameraX;

            // Mastro
            ctx.fillStyle = '#2C3E50';
            ctx.fillRect(gx, goal.y, 8, 200);

            // Bandeira vermelha
            ctx.fillStyle = '#E74C3C';
            ctx.beginPath();
            ctx.moveTo(gx + 8, goal.y + 15);
            ctx.lineTo(gx + 55, goal.y + 28);
            ctx.lineTo(gx + 8, goal.y + 42);
            ctx.fill();

            // Detalhe branco na bandeira
            ctx.fillStyle = '#fff';
            ctx.fillRect(gx + 12, goal.y + 22, 18, 4);
        }

        // ============ HUD ============
        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Arial';
            ctx.fillText(`SCORE ${score.toString().padStart(6, '0')}`, 30, 35);
            ctx.fillText(`x${coinsCollected.toString().padStart(2, '0')}`, 260, 35);
            ctx.fillText(`WORLD ${currentLevel}-1`, 420, 35);
            ctx.fillText(`LIVES ${lives}`, 620, 35);
        }

        // ============ ATUALIZAÇÃO ============
        function update() {
            if (gameState !== 'playing') return;

            // Movimento horizontal
            mario.velX *= friction;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                mario.velX = -mario.speed;
                mario.facing = -1;
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                mario.velX = mario.speed;
                mario.facing = 1;
            }

            // Pulo
            if ((keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' ']) && !mario.jumping) {
                mario.velY = mario.jumpPower;
                mario.jumping = true;
            }

            mario.velY += gravity;
            mario.x += mario.velX;
            mario.y += mario.velY;

            // Colisões com plataformas
            mario.jumping = true;
            for (let p of platforms) {
                if (collides(mario, p)) {
                    // Horizontal
                    if (mario.velX > 0) mario.x = p.x - mario.width;
                    else if (mario.velX < 0) mario.x = p.x + p.width;
                    mario.velX = 0;

                    // Vertical
                    if (mario.velY > 0) {
                        mario.y = p.y - mario.height;
                        mario.velY = 0;
                        mario.jumping = false;
                    } else if (mario.velY < 0) {
                        mario.y = p.y + p.height;
                        mario.velY = 0;

                        // Bater cabeça em bloco de pergunta
                        if (p.type === 'question' && p.coin) {
                            p.coin = false;
                            coinsCollected++;
                            score += 200;
                        }
                    }
                }
            }

            // Colisões com inimigos
            for (let e of enemies) {
                if (!e.alive) continue;
                if (collides(mario, e)) {
                    if (mario.velY > 2 && mario.y + mario.height - 15 < e.y + 10) {
                        // Pulou em cima
                        e.alive = false;
                        mario.velY = -13;
                        score += 400;
                    } else {
                        // Tocou de lado → morre
                        die();
                        return;
                    }
                }
            }

            // Coletar moedas
            for (let c of collectibles) {
                if (!c.collected && collides(mario, c)) {
                    c.collected = true;
                    coinsCollected++;
                    score += 100;
                }
            }

            // Movimento dos Goombas
            for (let e of enemies) {
                if (!e.alive) continue;
                e.x += e.velX;

                // Inverter direção ao bater em parede/plataforma
                for (let p of platforms) {
                    if (collides({ x: e.x, y: e.y, width: e.width, height: e.height }, p)) {
                        e.velX = -e.velX;
                        break;
                    }
                }
            }

            // Câmera (segue Mario)
            cameraX = Math.max(0, mario.x - 220);

            // Chegar na meta
            if (mario.x > goal.x - 30) {
                gameState = 'won';
            }

            // Caiu no abismo
            if (mario.y > HEIGHT + 100) {
                die();
            }
        }

        function die() {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
            } else {
                loadLevel(currentLevel);
            }
        }

        // ============ DESENHO PRINCIPAL ============
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawBackground();
            drawPlatforms();
            drawCollectibles();
            drawEnemies();
            drawMario();
            drawGoal();
            drawHUD();

            if (gameState === 'won') {
                ctx.fillStyle = 'rgba(0,0,0,0.75)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 38px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('NÍVEL COMPLETO!', WIDTH / 2, HEIGHT / 2 - 30);
                ctx.font = '20px Arial';
                ctx.fillStyle = '#fff';
                ctx.fillText('PRESSIONE "R" PARA O PRÓXIMO NÍVEL', WIDTH / 2, HEIGHT / 2 + 40);
            }

            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                ctx.fillStyle = '#E74C3C';
                ctx.font = 'bold 48px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', WIDTH / 2, HEIGHT / 2 - 20);
                ctx.fillStyle = '#fff';
                ctx.font = '20px Arial';
                ctx.fillText('PRESSIONE "R" PARA REINICIAR', WIDTH / 2, HEIGHT / 2 + 50);
            }
        }

        // ============ LOOP DO JOGO ============
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ============ CONTROLES ============
        window.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' || e.key === 'Spacebar') e.preventDefault();

            if ((gameState === 'won' || gameState === 'gameover') && e.key.toLowerCase() === 'r') {
                if (gameState === 'won') {
                    if (currentLevel < 2) {
                        loadLevel(currentLevel + 1);
                        gameState = 'playing';
                        score += 1000; // bônus de fase
                    } else {
                        alert('🏆 PARABÉNS! Você completou todos os níveis!\n\nObrigado por jogar essa versão HTML5 detalhada.');
                        loadLevel(1);
                        gameState = 'playing';
                        lives = 3;
                        score = 0;
                        coinsCollected = 0;
                    }
                } else {
                    lives = 3;
                    score = 0;
                    coinsCollected = 0;
                    loadLevel(1);
                    gameState = 'playing';
                }
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.key] = false;
        });

        // ============ INICIAR ============
        loadLevel(1);
        gameLoop();
    </script>
</body>
</html>
